name                = "ezeroandone-api"
main                = "worker/build/worker/shim.mjs"
compatibility_date  = "2025-01-01"

[[d1_databases]]
binding       = "DB"
database_name = "ezeroandone-db"
database_id   = "<uuid>"

[[kv_namespaces]]
binding = "EZO_AUTH"
id      = "<uuid>"

[[kv_namespaces]]
binding = "EZO_CACHE"
id      = "<uuid>"

[[r2_buckets]]
binding     = "EZO_MEDIA"
bucket_name = "ezeroandone-media"
