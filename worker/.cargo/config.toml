[build]
target = "wasm32-unknown-unknown"

# target-dir is intentionally not set here — use CARGO_TARGET_DIR env var
# locally if you want to keep artifacts outside OneDrive.
# e.g. add to your PowerShell profile: $env:CARGO_TARGET_DIR = "C:\cargo-target-ezo"

[target.wasm32-unknown-unknown]
rustflags = ["--cfg", "getrandom_backend=\"wasm_js\""]

# `cargo t` runs the unit/property test suite on the native host target
# (wasm binaries cannot execute directly on Windows).
[alias]
t = "test --lib --target x86_64-pc-windows-msvc"
