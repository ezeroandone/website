name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-worker:
    name: Build & Deploy Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            worker/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('worker/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build Rust WASM Worker
        working-directory: worker
        run: |
          cargo build --release --target wasm32-unknown-unknown
          wasm-pack build --target bundler --out-dir ../build/worker
          # Write ES module shim — worker-rs #[event(fetch)] exposes `fetch` via wasm-bindgen
          cat > ../build/worker/shim.mjs << 'EOF'
          import * as worker from "./worker_bg.js";
          import wasm from "./worker_bg.wasm";
          const instance = new WebAssembly.Instance(wasm, { "./worker_bg.js": worker });
          worker.__wbg_set_wasm(instance.exports);
          export default {
            fetch: worker.fetch ?? instance.exports.fetch,
          };
          EOF

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: List build output
        run: ls -la build/worker/ || echo "build/worker/ not found"

      - name: Deploy Worker to Cloudflare
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          QR_SECRET: ${{ secrets.QR_SECRET }}

  build-pages:
    name: Build & Deploy Pages (SvelteKit)
    runs-on: ubuntu-latest
    needs: build-worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build SvelteKit frontend
        working-directory: frontend
        run: npm run build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          QR_SECRET: ${{ secrets.QR_SECRET }}

      - name: Deploy to Cloudflare Pages
        working-directory: frontend
        run: |
          npx wrangler pages deploy .svelte-kit/cloudflare \
            --project-name ezeroandone-frontend \
            --branch main \
            --account-id 936ff9f812c24c5152246056e6e2008e
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
